function generateStars(count, worldWidth) {
  stars = [];
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * worldWidth,
      y: Math.random() * 300,
      size: Math.random() * 2 + 0.5,
      depth: Math.random() * 0.5 + 0.2,
      twinkle: Math.random() * Math.PI * 2
    });
  }
}

class Enemy {
  constructor(data) {
    this.type = data.type;
    this.x = data.x;
    this.y = data.y;
    this.startX = data.x;
    this.startY = data.y;
    this.w = 24;
    this.h = 24;
    this.speed = data.speed || 1.5;
    this.patrolRange = data.patrolRange || 100;
    this.direction = 1;
    this.amplitude = data.amplitude || 50;
    this.angle = Math.random() * Math.PI * 2;
    this.detectRange = data.detectRange || 200;
    this.chasing = false;
    this.dead = false;
    this.deathTimer = 0;
  }

  // Check if there's ground ahead
  hasGroundAhead() {
    if (this.type !== 'patrol') return true;
    
    const checkX = this.direction > 0 ? this.x + this.w + 5 : this.x - 5;
    const checkY = this.y + this.h + 5;
    
    for (const p of platforms) {
      if (checkX >= p.x && checkX <= p.x + p.w &&
          checkY >= p.y && checkY <= p.y + p.h) {
        return true;
      }
    }
    return false;
  }

  update() {
    if (this.dead) {
      this.deathTimer--;
      return;
    }

    if (this.type === 'patrol') {
      // Check for edge before moving
      if (!this.hasGroundAhead()) {
        this.direction *= -1;
      }
      
      this.x += this.speed * this.direction;
      
      // Also check patrol range
      if (this.x > this.startX + this.patrolRange) this.direction = -1;
      if (this.x < this.startX - this.patrolRange) this.direction = 1;
      
    } else if (this.type === 'flying') {
      this.angle += this.speed;
      this.y = this.startY + Math.sin(this.angle) * this.amplitude;
      this.x += Math.cos(this.angle * 0.5) * 0.5;
      if (this.x > this.startX + 100) this.x = this.startX - 100;
      if (this.x < this.startX - 100) this.x = this.startX + 100;
      
    } else if (this.type === 'chaser') {
      const dx = player.x - this.x;
      const dy = player.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      
      if (dist < this.detectRange) {
        this.chasing = true;
        this.x += (dx / dist) * this.speed;
        this.y += (dy / dist) * this.speed * 0.5;
      } else {
        this.chasing = false;
        this.x += this.speed * this.direction * 0.5;
        if (this.x > this.startX + 50) this.direction = -1;
        if (this.x < this.startX - 50) this.direction = 1;
      }
    }
  }

  stomp() {
    this.dead = true;
    this.deathTimer = 30;
    enemiesKilled++;
  }

  draw() {
    if (this.dead) {
      if (this.deathTimer > 0) {
        // Death animation - shrinking
        const scale = this.deathTimer / 30;
        ctx.save();
        ctx.globalAlpha = scale;
        const cx = this.x + this.w / 2;
        const cy = this.y + this.h / 2;
        ctx.translate(cx, cy);
        ctx.scale(scale, scale);
        ctx.translate(-cx, -cy);
        this.drawBody();
        ctx.restore();
      }
      return;
    }
    
    this.drawBody();
  }

  drawBody() {
    const cx = this.x + this.w / 2;
    const cy = this.y + this.h / 2;
    
    ctx.shadowBlur = 20;
    
    if (this.type === 'patrol') {
      ctx.shadowColor = '#ff0000';
      ctx.fillStyle = '#220000';
      ctx.fillRect(this.x, this.y, this.w, this.h);
      ctx.strokeStyle = '#ff0000';
      ctx.lineWidth = 2;
      ctx.strokeRect(this.x, this.y, this.w, this.h);
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(this.x + 5, this.y + 8, 4, 4);
      ctx.fillRect(this.x + 15, this.y + 8, 4, 4);
    } else if (this.type === 'flying') {
      ctx.shadowColor = '#ff00ff';
      ctx.fillStyle = '#220022';
      ctx.beginPath();
      ctx.arc(cx, cy, this.w / 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#ff00ff';
      ctx.lineWidth = 2;
      ctx.stroke();
      const wingOffset = Math.sin(time * 0.3) * 5;
      ctx.fillStyle = '#ff00ff';
      ctx.fillRect(this.x - 8, cy - 3 + wingOffset, 8, 6);
      ctx.fillRect(this.x + this.w, cy - 3 - wingOffset, 8, 6);
    } else if (this.type === 'chaser') {
      ctx.shadowColor = this.chasing ? '#ffff00' : '#ff6600';
      ctx.fillStyle = this.chasing ? '#332200' : '#221100';
      ctx.beginPath();
      ctx.moveTo(cx, this.y);
      ctx.lineTo(this.x + this.w, cy);
      ctx.lineTo(cx, this.y + this.h);
      ctx.lineTo(this.x, cy);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = this.chasing ? '#ffff00' : '#ff6600';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = this.chasing ? '#ffff00' : '#ff6600';
      ctx.beginPath();
      ctx.arc(cx, cy, 4, 0, Math.PI * 2);
      ctx.fill();
    }
    
    ctx.shadowBlur = 0;
  }
}

const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if ([' ', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault();
  if (e.key.toLowerCase() === 'r') restartGame();
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

function rectCollision(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}
function circleRectCollision(cx, cy, cr, rect) {
  const closestX = Math.max(rect.x, Math.min(cx, rect.x + rect.w));
  const closestY = Math.max(rect.y, Math.min(cy, rect.y + rect.h));
  const dx = cx - closestX;
  const dy = cy - closestY;
  return (dx * dx + dy * dy) < (cr * cr);
}

function loadLevel(idx) {
  const lvl = LEVELS[idx];
  platforms = lvl.platforms;
  levelCoins = lvl.coins.map(c => ({ x: c.x, y: c.y, collected: false, r: 10 }));
  enemies = lvl.enemies.map(e => new Enemy(e));
  goal = { ...lvl.goal };
  player.x = lvl.playerStart.x;
  player.y = lvl.playerStart.y;
  player.vx = 0; player.vy = 0;
  won = false;
  deathAnimation = 0;
  cameraX = 0;
  generateStars(150, lvl.worldWidth);
}

function update() {
  if (gameComplete || won) return;
  if (deathAnimation > 0) {
    deathAnimation--;
    if (deathAnimation === 0) {
      loadLevel(currentLevel);
      messageEl.textContent = '';
    }
    return;
  }
  time++;

  if (keys['arrowleft'] || keys['a']) player.vx = -player.speed;
  else if (keys['arrowright'] || keys['d']) player.vx = player.speed;
  else player.vx *= FRICTION;

  if ((keys['arrowup'] || keys['w'] || keys[' ']) && player.onGround) {
    player.vy = -player.jumpPower;
    player.onGround = false;
  }

  player.vy += GRAVITY;
  if (player.vy > 15) player.vy = 15;

  player.x += player.vx;
  for (const p of platforms) {
    if (rectCollision(player, p)) {
      if (player.vx > 0) player.x = p.x - player.w;
      else if (player.vx < 0) player.x = p.x + p.w;
      player.vx = 0;
    }
  }

  player.y += player.vy;
  player.onGround = false;
  for (const p of platforms) {
    if (rectCollision(player, p)) {
      if (player.vy > 0) {
        player.y = p.y - player.h;
        player.onGround = true;
      } else if (player.vy < 0) {
        player.y = p.y + p.h;
      }
      player.vy = 0;
    }
  }

  const lvl = LEVELS[currentLevel];
  if (player.x < 0) player.x = 0;
  if (player.x + player.w > lvl.worldWidth) player.x = lvl.worldWidth - player.w;

  const targetCameraX = player.x + player.w / 2 - canvas.width / 2;
  cameraX += (targetCameraX - cameraX) * 0.1;
  cameraX = Math.max(0, Math.min(cameraX, lvl.worldWidth - canvas.width));

  if (player.y > 450) {
    deathAnimation = 60;
    messageEl.textContent = '💀 SYSTEM FAILURE // REBOOTING...';
  }

  for (const coin of levelCoins) {
    if (coin.collected) continue;
    if (circleRectCollision(coin.x, coin.y, coin.r, player)) {
      coin.collected = true;
      totalScore++;
    }
  }

  // Update enemies and check collisions
  for (const enemy of enemies) {
    if (enemy.dead) continue;
    
    enemy.update();
    
    if (rectCollision(player, enemy)) {
      // Check if player is stomping (falling from above)
      const playerBottom = player.y + player.h;
      const enemyTop = enemy.y;
      const isFalling = player.vy > 0;
      const isAbove = playerBottom < enemyTop + enemy.h * 0.5;
      
      if (isFalling && isAbove) {
        // STOMP!
        enemy.stomp();
        player.vy = -8; // Bounce up
        messageEl.textContent = '💥 ENEMY DESTROYED!';
        setTimeout(() => {
          if (!won && !gameComplete && deathAnimation === 0) {
            messageEl.textContent = '';
          }
        }, 800);
      } else {
        // Player dies
        deathAnimation = 60;
        messageEl.textContent = '💀 DESTROYED BY ENEMY // REBOOTING...';
      }
    }
  }

  // Remove fully dead enemies
  enemies = enemies.filter(e => !e.dead || e.deathTimer > 0);

  if (rectCollision(player, goal)) {
    won = true;
    if (currentLevel < LEVELS.length - 1) {
      messageEl.textContent = `>> ${LEVELS[currentLevel].name} CLEARED <<`;
      setTimeout(() => {
        currentLevel++;
        loadLevel(currentLevel);
        messageEl.textContent = `ENTERING ${LEVELS[currentLevel].name}`;
        setTimeout(() => { if (!gameComplete) messageEl.textContent = ''; }, 1500);
      }, 1500);
    } else {
      gameComplete = true;
      messageEl.textContent = `ALL SECTORS CLEARED // SCORE: ${totalScore} // KILLS: ${enemiesKilled}`;
    }
  }
}

function draw() {
  const lvl = LEVELS[currentLevel];
  
  const grad = ctx.createLinearGradient(0, 0, 0, 450);
  grad.addColorStop(0, lvl.bgTop);
  grad.addColorStop(0.6, lvl.bgMid);
  grad.addColorStop(1, lvl.bgBot);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 800, 450);

  for (const star of stars) {
    const sx = star.x - cameraX * star.depth;
    const wrappedX = ((sx % 800) + 800) % 800;
    const twinkle = Math.sin(time * 0.05 + star.twinkle) * 0.3 + 0.7;
    ctx.fillStyle = `rgba(255, 255, 255, ${twinkle})`;
    ctx.fillRect(wrappedX, star.y, star.size, star.size);
  }

  const sunX = 400 - cameraX * 0.1;
  const sunGrad = ctx.createLinearGradient(sunX, 130, sunX, 370);
  sunGrad.addColorStop(0, lvl.sunColor1);
  sunGrad.addColorStop(1, lvl.sunColor2);
  ctx.fillStyle = sunGrad;
  ctx.beginPath();
  ctx.arc(sunX, 250, 120, Math.PI, 0);
  ctx.fill();

  ctx.strokeStyle = 'rgba(255, 0, 255, 0.3)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 10; i++) {
    const y = 420 + (i * i * 0.8);
    if (y > 450) break;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(800, y);
    ctx.stroke();
  }
  for (let i = -15; i <= 15; i++) {
    const baseX = 400 + (i * 40) - (cameraX * 0.3);
    const x1 = baseX;
    const x2 = 400 + (i * 200) - (cameraX * 0.3);
    ctx.beginPath();
    ctx.moveTo(x1, 420);
    ctx.lineTo(x2, 450);
    ctx.stroke();
  }

  ctx.save();
  ctx.translate(-cameraX, 0);

  for (const p of platforms) {
    if (p.x + p.w < cameraX || p.x > cameraX + 800) continue;
    const hue = (time * 2 + p.x) % 360;
    ctx.shadowBlur = 15;
    ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
    ctx.fillStyle = '#0a0014';
    ctx.fillRect(p.x, p.y, p.w, p.h);
    const platGrad = ctx.createLinearGradient(p.x, p.y, p.x + p.w, p.y);
    for (let i = 0; i <= 4; i++) {
      const segHue = (i * 90 + p.x * 0.5 + time * 2) % 360;
      platGrad.addColorStop(i / 4, `hsl(${segHue}, 100%, 50%)`);
    }
    ctx.strokeStyle = platGrad;
    ctx.lineWidth = 3;
    ctx.strokeRect(p.x, p.y, p.w, p.h);
    ctx.shadowBlur = 0;
  }

  for (const coin of levelCoins) {
    if (coin.collected) continue;
    if (coin.x < cameraX - 20 || coin.x > cameraX + 820) continue;
    const pulse = Math.sin(time * 0.15 + coin.x * 0.1) * 2;
    const r = coin.r + pulse;
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#ffeb3b';
    ctx.fillStyle = '#ffeb3b';
    ctx.beginPath();
    ctx.arc(coin.x, coin.y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff59d';
    ctx.beginPath();
    ctx.arc(coin.x, coin.y, r * 0.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  for (const enemy of enemies) {
    if (enemy.x + enemy.w < cameraX || enemy.x > cameraX + 800) continue;
    enemy.draw();
  }

  if (goal.x + goal.w > cameraX && goal.x < cameraX + 800) {
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#ff007f';
    ctx.fillStyle = '#220011';
    ctx.fillRect(goal.x, goal.y, goal.w, goal.h);
    ctx.fillStyle = '#ff007f';
    ctx.fillRect(goal.x + 4, goal.y + 4, goal.w - 8, goal.h - 8);
    ctx.fillStyle = '#fff';
    ctx.fillRect(goal.x + 10, goal.y + 10, goal.w - 20, goal.h - 20);
    ctx.shadowBlur = 0;
  }

  if (deathAnimation === 0) {
    const cx = player.x + player.w / 2;
    const cy = player.y + player.h / 2;
    const r = player.w / 2;
    ctx.shadowBlur = 25;
    ctx.shadowColor = '#0ff';
    ctx.fillStyle = '#001122';
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#0ff';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.setLineDash([4, 4]);
    ctx.lineDashOffset = -time * 0.5;
    ctx.strokeStyle = '#f0f';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, r + 4, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    const pulse = Math.sin(time * 0.2) * 0.3 + 0.7;
    ctx.fillStyle = `rgba(0, 255, 255, ${pulse})`;
    ctx.beginPath();
    ctx.arc(cx, cy, r * 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(cx, cy, r * 0.15, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  ctx.restore();

  if (deathAnimation > 0) {
    ctx.fillStyle = `rgba(255, 0, 0, ${deathAnimation / 120})`;
    ctx.fillRect(0, 0, 800, 450);
  }

  ctx.shadowBlur = 10;
  ctx.shadowColor = '#0ff';
  ctx.fillStyle = '#0ff';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`// ${lvl.name}`, 15, 25);
  ctx.shadowColor = '#ffeb3b';
  ctx.fillStyle = '#ffeb3b';
  ctx.textAlign = 'right';
  ctx.fillText(`DATA: ${totalScore}`, 785, 25);
  const collected = levelCoins.filter(c => c.collected).length;
  ctx.shadowColor = '#f0f';
  ctx.fillStyle = '#f0f';
  ctx.font = 'bold 11px monospace';
  ctx.fillText(`NODES: ${collected}/${levelCoins.length}`, 785, 42);
  ctx.textAlign = 'left';
  ctx.fillText(`LEVEL ${currentLevel + 1}/5`, 15, 42);
  ctx.fillText(`KILLS: ${enemiesKilled}`, 15, 58);
  ctx.shadowBlur = 0;

  const mmW = 200, mmH = 20;
  const mmX = 300, mmY = 10;
  ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
  ctx.fillRect(mmX, mmY, mmW, mmH);
  ctx.strokeStyle = '#0ff';
  ctx.lineWidth = 1;
  ctx.strokeRect(mmX, mmY, mmW, mmH);
  const playerRatio = player.x / lvl.worldWidth;
  const viewRatio = 800 / lvl.worldWidth;
  ctx.fillStyle = 'rgba(0, 255, 255, 0.2)';
  ctx.fillRect(mmX + (cameraX / lvl.worldWidth) * mmW, mmY, viewRatio * mmW, mmH);
  ctx.fillStyle = '#0ff';
  ctx.beginPath();
  ctx.arc(mmX + playerRatio * mmW, mmY + mmH / 2, 3, 0, Math.PI * 2);
  ctx.fill();
  const goalRatio = goal.x / lvl.worldWidth;
  ctx.fillStyle = '#ff007f';
  ctx.beginPath();
  ctx.arc(mmX + goalRatio * mmW, mmY + mmH / 2, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffeb3b';
  for (const coin of levelCoins) {
    if (coin.collected) continue;
    const coinRatio = coin.x / lvl.worldWidth;
    ctx.fillRect(mmX + coinRatio * mmW - 1, mmY + mmH / 2 - 1, 2, 2);
  }
  ctx.fillStyle = '#ff0000';
  for (const enemy of enemies) {
    if (enemy.dead) continue;
    const enemyRatio = enemy.x / lvl.worldWidth;
    ctx.fillRect(mmX + enemyRatio * mmW - 1, mmY + mmH / 2 - 1, 2, 2);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

function restartGame() {
  currentLevel = 0;
  totalScore = 0;
  enemiesKilled = 0;
  gameComplete = false;
  messageEl.textContent = '';
  loadLevel(0);
}

loadLevel(0);
loop();
</script>
